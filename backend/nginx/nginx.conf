# ─── YAAP NGINX Configuration (Development) ───────────────────────────────────
# Handles: WebSocket upgrade, static files, rate limiting

upstream django {
    server web:8000;
    keepalive 32;
}

# ─── Rate limit zones ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;   # login/signup
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;   # general API
limit_req_zone $binary_remote_addr zone=ws:10m      rate=5r/s;    # WebSocket handshake

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;   # avatar + voice sample uploads
    keepalive_timeout    65;

    # ─── Static Files ─────────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Health Check (no auth, no rate limit) ────────────────────────────────
    location /health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Auth Endpoints (strict rate limit) ───────────────────────────────────
    location ~ ^/api/v1/auth/(signup|login|otp|google)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── WebSocket Connections ────────────────────────────────────────────────
    location ~ ^/ws/ {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass          http://django;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # 1 hour — long-lived WebSocket connections
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ─── Translation WebSocket (audio pipeline) ────────────────────────────────
    location ~ ^/ws/translate/ {
        limit_req zone=ws burst=5 nodelay;

        proxy_pass          http://django;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ─── General API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ─── API Docs ─────────────────────────────────────────────────────────────
    location ~ ^/api/(schema|docs|redoc)/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
